<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Mesero</title>
<style>
    :root {
        --bg-body: #0a0a0a;
        --panel-left: #121212;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --accent-white: #ffffff;
        --bg-image: url('../img_genericos/imagen_vaso.avif');
    }

    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-body);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: var(--text-main);
        overflow: hidden;
    }

    /* Silenciar advertencias visuales nativas */
    input:invalid, input:required {
        box-shadow: none !important;
    }

    .main-container {
        display: flex;
        width: 1100px;
        height: 600px;
        background-color: var(--panel-left);
        border-radius: 30px;
        overflow: hidden;
        border: 4px solid #222;
        box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        position: relative;
    }

    .left-panel {
        width: 42%;
        padding: 30px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background-color: #121212;
        z-index: 2;
        border-right: 1px solid rgba(255, 255, 255, 0.05);
    }

    .brand-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 1.2rem;
        margin-bottom: 20px;
        color: var(--accent-white);
        text-transform: uppercase;
    }

    /* Círculo con logo, más grande y sin deformarse */
    .st-circle {
        width: 180px;
        height: 180px;
        min-width: 180px;
        min-height: 180px;
        background: linear-gradient(145deg, #2a2a2a, #0f0f0f);
        border-radius: 50%;
        margin: 0 auto 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 4px solid #1a1a1a;
        box-shadow: inset 0 5px 10px rgba(255, 255, 255, 0.05), 0 15px 35px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        flex-shrink: 0;
    }

    .st-circle img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .st-circle span {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(to bottom, #fff 30%, #888 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
    }

    .form-group { margin-bottom: 16px; }
    
    .form-group label {
        display: block;
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .form-group input {
        width: 100%;
        padding: 11px 15px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        color: white;
        transition: all 0.3s ease;
        font-size: 0.9rem;
        box-sizing: border-box;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--accent-white);
        background: #222;
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
    }

    .error-message {
        font-size: 0.7rem;
        color: #ff605c;
        margin-top: 5px;
        display: none;
        font-weight: 500;
    }

    .error-message.show { display: block; }

    .btn-submit {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        border: none;
        background-color: var(--accent-white);
        color: #000;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
        font-size: 0.9rem;
        text-transform: uppercase;
    }

    .btn-submit:hover { 
        background-color: #e0e0e0; 
        transform: translateY(-2px);
    }

    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { 
        color: var(--text-muted); 
        text-decoration: none; 
        font-size: 0.8rem; 
    }
    .back-link a:hover { color: var(--accent-white); }

    .right-panel {
        width: 58%;
        background-image: var(--bg-image);
        background-size: cover;
        background-position: center;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 60px;
    }

    .right-panel::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
    }

    .welcome-text { position: relative; z-index: 2; }
    .welcome-text h1 { 
        font-size: 4rem; 
        margin: 0; 
        letter-spacing: -2px; 
        background: linear-gradient(to bottom, #fff 40%, #999 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .welcome-text p { color: var(--text-muted); font-size: 1.1rem; margin-top: 5px; }

    /* Modales */
    .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .modal.show { display: flex; }
    .modal-content {
        background: #1a1a1a;
        border-radius: 24px;
        padding: 35px;
        text-align: center;
        border: 1px solid #333;
        width: 320px;
        animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-icon { width: 55px; height: 55px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
    .modal-success { background: #ffffff; color: #000; }
    .modal-error { background: #ff605c; color: #fff; }
    .modal-btn { background: white; color: black; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }

    @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div class="main-container">
    <div class="left-panel">
        <div class="brand-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Mesero Access
        </div>

        <!-- Logo en lugar de MS -->
        <div class="st-circle">
            <img src="../img_genericos/descarga.png" alt="Logo">
        </div>

        <form id="loginForm" method="POST" action="php/validar_mesero.php" novalidate>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="correo" id="correo" autocomplete="email" placeholder="nombre@restaurante.com">
                <div class="error-message" id="error-correo"></div>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" id="password" autocomplete="current-password" placeholder="••••••••">
                <div class="error-message" id="error-password"></div>
            </div>
            <button type="submit" class="btn-submit" id="btnSubmit">Entrar al Sistema</button>
        </form>

        <div class="back-link">
            <a href="../index.html">← Volver al portal</a>
        </div>
    </div>

    <div class="right-panel">
        <div class="welcome-text">
            <h1>Servicio.</h1>
            <p>Panel de gestión de pedidos y mesas.</p>
        </div>
    </div>
</div>

<div id="notificationModal" class="modal">
    <div class="modal-content">
        <div class="modal-icon" id="modalIcon"></div>
        <p class="modal-message" id="modalMessage"></p>
        <button class="modal-btn" onclick="closeModal()">Continuar</button>
    </div>
</div>

<script>
/* Lógica de control unificada */
function showModal(message, isSuccess = true) {
    const modal = document.getElementById('notificationModal');
    const modalIcon = document.getElementById('modalIcon');
    const modalMessage = document.getElementById('modalMessage');
    modalIcon.className = 'modal-icon ' + (isSuccess ? 'modal-success' : 'modal-error');
    modalIcon.innerHTML = isSuccess ? '✓' : '✕';
    modalMessage.textContent = message;
    modal.classList.add('show');
    if(isSuccess) setTimeout(() => closeModal(), 3000);
}

function closeModal() {
    document.getElementById('notificationModal').classList.remove('show');
}

const correoInput = document.getElementById('correo');
const passInput = document.getElementById('password');
const errorCorreo = document.getElementById('error-correo');
const errorPass = document.getElementById('error-password');

function validarCorreo() {
    const val = correoInput.value.trim();
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (val === '') { errorCorreo.classList.remove('show'); return false; }
    if (!regex.test(val)) {
        errorCorreo.textContent = 'Email no válido';
        errorCorreo.classList.add('show');
        return false;
    }
    errorCorreo.classList.remove('show');
    return true;
}

function validarPassword() {
    const val = passInput.value.trim();
    if (val.length < 4) {
        errorPass.textContent = 'Mínimo 4 caracteres';
        errorPass.classList.add('show');
        return false;
    }
    errorPass.classList.remove('show');
    return true;
}

correoInput.addEventListener('input', validarCorreo);
passInput.addEventListener('input', validarPassword);

const form = document.getElementById('loginForm');
let submitLock = false;

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (submitLock) return;
    
    if (!validarCorreo() || !validarPassword()) {
        showModal('Por favor verifica tus credenciales', false);
        return;
    }
    
    submitLock = true;
    const btn = document.getElementById('btnSubmit');
    const originalText = btn.innerHTML;
    btn.innerHTML = 'Accediendo...';
    btn.disabled = true;
    
    const formData = new FormData(form);
    try {
        const response = await fetch('php/validar_mesero.php', {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        const result = await response.json();
        if (result.success) {
            showModal(result.message, true);
            setTimeout(() => window.location.href = result.redirect, 1000);
        } else {
            showModal(result.message, false);
        }
    } catch (err) {
        showModal('Error en la conexión', false);
    } finally {
        submitLock = false;
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});
</script>
</body>
</html>
